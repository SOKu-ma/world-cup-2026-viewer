<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow,noarchive,noimageindex">
    <meta name="googlebot" content="noindex,nofollow,noarchive,noimageindex">
    <title>World Cup 2026 FACT / Simulator</title>
    <script>
        try {
            document.documentElement.dataset.theme = localStorage.getItem("worldCup2026Theme") === "light" ? "light" : "dark";
        } catch (error) {
            document.documentElement.dataset.theme = "dark";
        }
    </script>
    <style>
        :root {
            --ink: #1f2933;
            --muted: #65758b;
            --line: #d7dde6;
            --panel: #ffffff;
            --canvas: #f4f6f9;
            --navy: #17324d;
            --green: #0f8a5f;
            --green-soft: #dff7ec;
            --amber: #a16207;
            --amber-soft: #fff3c4;
            --red: #c93535;
            --red-soft: #ffe4e4;
            --blue-soft: #e8f1ff;
            --shadow: 0 12px 26px rgba(20, 32, 48, 0.08);
            color-scheme: light;
        }

        :root[data-theme="dark"] {
            --ink: #e6edf5;
            --muted: #a3b1c2;
            --line: #344255;
            --panel: #18222e;
            --canvas: #0e151e;
            --navy: #91c7f2;
            --green: #60d9aa;
            --green-soft: #153c32;
            --amber: #f4c96a;
            --amber-soft: #453818;
            --red: #ff747d;
            --red-soft: #48252a;
            --blue-soft: #1b3550;
            --shadow: 0 12px 26px rgba(0, 0, 0, 0.24);
            color-scheme: dark;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--canvas);
            color: var(--ink);
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
            letter-spacing: 0;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .page {
            max-width: 1500px;
            margin: 0 auto;
            padding: 22px;
        }

        .app-header {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px 20px;
            box-shadow: var(--shadow);
        }

        .header-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 18px;
            flex-wrap: wrap;
        }

        .header-controls {
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        h1 {
            margin: 0;
            font-size: clamp(24px, 3vw, 36px);
            line-height: 1.1;
        }

        .subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .mode-switch {
            display: inline-grid;
            grid-template-columns: repeat(5, minmax(86px, 1fr));
            gap: 4px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #eef2f7;
        }

        .mode-button,
        .update-button,
        .records-language-button,
        .theme-toggle,
        .action-button,
        .primary-button {
            min-height: 40px;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 0 14px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.16s, border 0.16s, color 0.16s, transform 0.16s;
        }

        .mode-button,
        .update-button,
        .records-language-button {
            background: transparent;
            color: var(--muted);
        }

        .update-panel {
            display: grid;
            gap: 4px;
            justify-items: end;
        }

        .update-label,
        .refresh-status {
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            line-height: 1.2;
        }

        .update-switch,
        .records-language-switch {
            display: inline-grid;
            grid-template-columns: repeat(2, minmax(72px, 1fr));
            gap: 4px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #eef2f7;
        }

        .update-button,
        .records-language-button {
            min-height: 32px;
            padding: 0 10px;
            font-size: 12px;
        }

        .mode-button:focus-visible,
        .update-button:focus-visible,
        .records-language-button:focus-visible,
        .theme-toggle:focus-visible,
        .action-button:focus-visible,
        .primary-button:focus-visible {
            outline: 3px solid rgba(23, 50, 77, 0.24);
            outline-offset: 2px;
        }

        .mode-button.is-active,
        .update-button.is-active,
        .records-language-button.is-active {
            background: var(--panel);
            border-color: var(--line);
            color: var(--navy);
            box-shadow: 0 2px 8px rgba(31, 41, 51, 0.08);
        }

        .action-button {
            background: var(--panel);
            border-color: var(--line);
            color: var(--ink);
        }

        .theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            background: var(--panel);
            border-color: var(--line);
            color: var(--ink);
            white-space: nowrap;
        }

        .theme-toggle-icon {
            font-size: 16px;
            line-height: 1;
        }

        .primary-button {
            background: var(--navy);
            color: #fff;
        }

        button:hover { transform: translateY(-1px); }

        main { margin-top: 18px; }

        .toolbar {
            position: sticky;
            top: 10px;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(244, 246, 249, 0.94);
            border: 1px solid var(--line);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .toolbar-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .source-line {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.4;
        }

        .source-line strong { color: var(--ink); }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            margin: 24px 0 12px;
        }

        h2 {
            margin: 0;
            font-size: 22px;
            line-height: 1.2;
        }

        .section-note {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
            text-align: right;
        }

        .legend {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .swatch {
            width: 14px;
            height: 14px;
            border: 1px solid var(--line);
            border-radius: 3px;
        }

        .swatch.green { background: var(--green-soft); }
        .swatch.amber { background: var(--amber-soft); }
        .swatch.blue { background: var(--blue-soft); }

        .japan-path-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
            align-items: stretch;
        }

        .japan-path-card,
        .japan-route-card,
        .japan-note-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(20, 32, 48, 0.05);
        }

        .japan-path-card {
            display: grid;
            gap: 12px;
            padding: 16px;
        }

        .japan-path-card.is-confirmed {
            border-top: 4px solid var(--red);
        }

        .japan-path-card.is-advanced {
            border-top: 4px solid var(--green);
        }

        .japan-path-card.is-eliminated {
            border-top: 4px solid var(--navy);
        }

        .path-kicker {
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
        }

        .path-title {
            margin: 0;
            font-size: 18px;
            line-height: 1.25;
        }

        .path-opponent {
            font-size: 24px;
            font-weight: 900;
            line-height: 1.18;
        }

        .path-opponent-team {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            max-width: 100%;
        }

        .path-opponent-team .team-flag {
            width: 28px;
            height: 22px;
            font-size: 18px;
        }

        .path-result-line {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            max-width: 100%;
            flex-wrap: wrap;
        }

        .path-result-team {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .path-score {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 52px;
            padding: 3px 8px;
            border-radius: 999px;
            background: #eef2f7;
            color: var(--ink);
            font-size: 18px;
            line-height: 1.1;
        }

        .path-route {
            display: inline-flex;
            width: fit-content;
            max-width: 100%;
            padding: 5px 8px;
            border-radius: 6px;
            background: #eef2f7;
            color: var(--ink);
            font-size: 12px;
            font-weight: 900;
            overflow-wrap: anywhere;
        }

        .expected-team-panel {
            display: grid;
            gap: 8px;
            padding: 10px;
            border: 1px solid #edf0f5;
            border-radius: 8px;
            background: #fbfcfe;
        }

        .expected-team-label {
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
        }

        .expected-team-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 10px;
        }

        .expected-team-main {
            min-width: 0;
            font-weight: 900;
        }

        .expected-team-main .team-cell {
            font-size: 15px;
            line-height: 1.2;
        }

        .expected-rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 74px;
            padding: 4px 7px;
            border-radius: 999px;
            background: var(--green-soft);
            color: var(--green);
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        .expected-slot-note {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.35;
        }

        .expected-group-snapshot {
            display: grid;
            gap: 5px;
            padding-top: 8px;
            border-top: 1px solid #edf0f5;
        }

        .expected-group-row {
            display: grid;
            grid-template-columns: 24px minmax(0, 1fr) auto;
            align-items: center;
            gap: 7px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.3;
        }

        .expected-group-row.is-target {
            color: var(--ink);
            font-weight: 900;
        }

        .expected-group-team {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .expected-group-stat {
            color: inherit;
            white-space: nowrap;
        }

        .path-meta,
        .japan-card-note {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .japan-note-panel {
            margin-top: 14px;
            padding: 14px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
        }

        .japan-note-panel strong {
            color: var(--ink);
        }

        .japan-route-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 14px;
            align-items: start;
        }

        .japan-route-card {
            display: grid;
            gap: 12px;
            padding: 14px;
            border-top: 4px solid var(--navy);
        }

        .japan-route-card.is-first {
            border-top-color: var(--red);
        }

        .route-card-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .route-card-head h3 {
            margin: 0;
            font-size: 17px;
            line-height: 1.28;
        }

        .route-step-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 42px;
            padding: 4px 7px;
            border-radius: 999px;
            background: #eef2f7;
            color: var(--navy);
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
        }

        .route-match-meta,
        .route-branch-title {
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            line-height: 1.35;
        }

        .route-team-list,
        .route-branch-list {
            display: grid;
            gap: 7px;
        }

        .route-team-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 8px;
            min-height: 42px;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fbfcfe;
        }

        .route-team-row.is-japan {
            border-color: rgba(201, 53, 53, 0.45);
            background: var(--red-soft);
            color: #8f2424;
            font-weight: 900;
        }

        .route-team-row.is-route-focus {
            border-color: rgba(15, 138, 95, 0.45);
            background: var(--green-soft);
            color: var(--green);
            font-weight: 900;
        }

        .route-team-main {
            min-width: 0;
        }

        .route-team-name {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            font-size: 14px;
            font-weight: 900;
            line-height: 1.2;
        }

        .route-team-name-text {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .route-team-sub {
            display: block;
            margin-top: 2px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            line-height: 1.25;
            overflow-wrap: anywhere;
        }

        .route-slot-code {
            padding: 3px 7px;
            border-radius: 999px;
            background: #eef2f7;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
        }

        .route-team-row.is-japan .route-slot-code {
            background: #fff;
            color: #8f2424;
        }

        .route-team-row.is-route-focus .route-slot-code {
            background: #fff;
            color: var(--green);
        }

        .route-branch {
            display: grid;
            gap: 8px;
            padding-top: 10px;
            border-top: 1px solid #edf0f5;
        }

        .route-branch-match {
            display: grid;
            gap: 6px;
            padding: 8px;
            border: 1px solid #edf0f5;
            border-radius: 6px;
            background: #fbfcfe;
        }

        .route-branch-match-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            line-height: 1.25;
        }

        .route-branch-sides {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            align-items: center;
            gap: 7px;
        }

        .route-branch-side {
            display: flex;
            align-items: center;
            gap: 5px;
            min-width: 0;
            padding: 3px 5px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 900;
            line-height: 1.25;
        }

        .route-branch-side.is-winner {
            background: var(--green-soft);
            color: var(--green);
        }

        .route-branch-side:last-child {
            justify-content: flex-end;
            text-align: right;
        }

        .route-branch-side-text {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .route-vs {
            color: var(--muted);
            font-size: 10px;
            font-weight: 900;
        }

        .route-branch-score {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 38px;
            padding: 4px 6px;
            border-radius: 999px;
            background: #eef2f7;
            color: var(--ink);
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
        }

        .route-branch-score.is-final {
            background: var(--green-soft);
            color: var(--green);
        }

        .groups-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 14px;
            align-items: start;
        }

        .group-card,
        .stage-panel,
        .empty-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(20, 32, 48, 0.05);
        }

        .group-card {
            padding: 12px;
            overflow: hidden;
        }

        .group-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--line);
        }

        .group-title h3 {
            margin: 0;
            font-size: 17px;
        }

        .group-meta {
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 12px;
        }

        th, td {
            padding: 6px 4px;
            border-bottom: 1px solid #edf0f5;
            text-align: center;
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            background: #f0f3f7;
            font-size: 11px;
            font-weight: 800;
        }

        .rank-col { width: 28px; }
        .team-col { width: auto; }
        .num-col { width: 33px; }

        .team-name,
        .team-cell {
            text-align: left;
            overflow-wrap: anywhere;
        }

        .team-cell {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .team-flag {
            flex: 0 0 auto;
            width: 22px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(31, 41, 51, 0.18);
            border-radius: 3px;
            background: #fff;
            font-size: 15px;
            line-height: 1;
            box-shadow: 0 1px 2px rgba(20, 32, 48, 0.08);
        }

        .team-code {
            flex: 0 0 auto;
            min-width: 34px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
        }

        .qualified-top2 { background: var(--green-soft); font-weight: 800; }
        .qualified-third { background: var(--amber-soft); font-weight: 800; }
        .incomplete-rank { background: var(--blue-soft); }

        .match-list {
            display: grid;
            gap: 7px;
            margin-top: 12px;
        }

        .fact-match-row,
        .bracket-match-card,
        .sim-match-card {
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fbfcfe;
        }

        .fact-match-row {
            display: grid;
            grid-template-columns: minmax(54px, 0.5fr) minmax(0, 1fr) auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 7px;
            padding: 7px;
            min-height: 46px;
        }

        .match-date {
            color: var(--muted);
            font-size: 11px;
            line-height: 1.25;
        }

        .match-team {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            font-size: 12px;
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .match-team.home {
            justify-content: flex-end;
            text-align: right;
        }

        .match-team.away {
            justify-content: flex-start;
            text-align: left;
        }

        .match-team-name {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .score-display {
            display: grid;
            grid-template-columns: 28px 8px 28px;
            align-items: center;
            gap: 3px;
            padding: 5px 7px;
            border-radius: 999px;
            background: #eef2f7;
            color: var(--ink);
            font-size: 13px;
            font-weight: 900;
            white-space: nowrap;
        }

        .score-display span {
            color: var(--muted);
            text-align: center;
            font-weight: 800;
        }

        .score-value { text-align: center; }

        .status-pill {
            justify-self: end;
            min-width: 44px;
            padding: 4px 7px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 900;
            text-align: center;
            white-space: nowrap;
        }

        .status-final { color: var(--green); background: var(--green-soft); }
        .status-live { color: var(--red); background: var(--red-soft); }
        .status-scheduled { color: var(--muted); background: #eef2f7; }

        .calendar-shell {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 14px;
            align-items: stretch;
        }

        .calendar-month-shell {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 4px 14px rgba(20, 32, 48, 0.05);
            -webkit-overflow-scrolling: touch;
        }

        .calendar-month {
            width: 100%;
            min-width: 660px;
        }

        .calendar-month-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            background: #f8fafc;
        }

        .calendar-month-title h3 {
            margin: 0;
            font-size: 18px;
            line-height: 1.2;
        }

<div class="page">

        <div class="header-row">
            <div>

function applyTheme(theme) {
    document.documentElement.dataset.theme = theme === "dark" ? "dark" : "light";
    syncThemeControl();
}

function syncThemeControl() {
    const isDark = document.documentElement.dataset.theme === "dark";
    themeToggle.setAttribute("aria-pressed", String(isDark));
    themeToggle.setAttribute("aria-label", isDark ? "ライトモードに切り替え" : "ダークモードに切り替え");
    themeToggle.querySelector("[data-theme-icon]").textContent = isDark ? "☀" : "☾";
    themeToggle.querySelector("[data-theme-label]").textContent = isDark ? "ライト" : "ダーク";
}

async function loadFactData({ silent = false } = {}) {
    if (!silent) state.factLoading = true;
    state.factRefreshing = true;
    state.factError = "";
    syncUpdateControls();
    if (!silent) render();

    try {
        const snapshot = await fetchJson(SNAPSHOT_URL);

        state.matches = snapshot.matches || [];
        state.playerStats = normalizePlayerStats(snapshot.playerStats || []);
        state.playerStatsUpdatedAt = snapshot.playerStatsUpdatedAt || (state.playerStats.length ? snapshot.fetchedAt : "") || "";
        state.standingsOrder = snapshot.standingsOrder || {};
        state.bracket = snapshot.bracket?.length ? snapshot.bracket : [...FALLBACK_BRACKET];
        state.sourceLabel = `同梱データ作成: ${formatDateTime(snapshot.fetchedAt)}`;
        state.lastRefreshAt = new Date().toISOString();
    } catch (error) {
        state.factError = "同梱データを読み込めませんでした。時間を置いて再読み込みしてください。";
        state.bracket = [...FALLBACK_BRACKET];
    } finally {
        state.factLoading = false;
        state.factRefreshing = false;
        render();
        syncUpdateControls();
    }
}

function getInitialUpdateMode() {
    try {
        return localStorage.getItem(UPDATE_MODE_STORAGE_KEY) === "auto" ? "auto" : "manual";
    } catch (error) {
        return "manual";
    }
}

function getInitialRecordsLanguage() {
    try {
        return localStorage.getItem(RECORDS_LANGUAGE_STORAGE_KEY) === "en" ? "en" : "ja";
    } catch (error) {
        return "ja";
    }
}

function saveUpdateMode(mode) {
    try {
        localStorage.setItem(UPDATE_MODE_STORAGE_KEY, mode);
    } catch (error) {
        // Ignore storage failures; the in-memory mode still works for this page session.
    }
}

function saveRecordsLanguage(language) {
    try {
        localStorage.setItem(RECORDS_LANGUAGE_STORAGE_KEY, language);
    } catch (error) {
        // Ignore storage failures; the in-memory language still works for this page session.
    }
}

function configureAutoRefresh() {
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = null;

    if (state.updateMode !== "auto") return;
    autoRefreshTimer = setInterval(() => loadFactData({ silent: true }), AUTO_REFRESH_INTERVAL_MS);
}

function syncUpdateControls() {
    document.querySelectorAll("[data-update-mode]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.updateMode === state.updateMode);
    });

    if (!refreshStatus) return;
    const modeLabel = state.updateMode === "auto" ? "自動" : "手動";
    const refreshLabel = state.factRefreshing
        ? "更新中"
        : (state.lastRefreshAt ? `最終取得: ${formatDateTime(state.lastRefreshAt)}` : "未取得");
    refreshStatus.textContent = `${modeLabel} / ${refreshLabel}`;
}

async function fetchJson(url) {
    const response = await fetch(url, { cache: "no-store" });
    if (!response.ok) throw new Error(`${response.status} ${url}`);
    return response.json();
}

function render() {
    if (state.mode === "fact") renderFact();
    else if (state.mode === "calendar") renderCalendar();
    else if (state.mode === "records") renderRecords();
    else if (state.mode === "japan") renderJapanPath();
    else renderSimulation();
}

function buildCalendarEntries(groupData) {
    const entrantContext = buildFactEntrantContext(groupData);
    const groupEntries = state.matches.map((match) => ({
        type: "group",
        number: Number(match.number),
        date: match.date,
        stage: `グループ ${match.group}`,
        home: match.home,
        away: match.away,
        homeCode: match.homeCode || "",
        awayCode: match.awayCode || "",
        homeScore: normalizeScore(match.homeScore),
        awayScore: normalizeScore(match.awayScore),
        status: match.status || "scheduled",
        matchTime: match.matchTime || ""
    }));

    const bracketEntries = (state.bracket || []).map((match) => {
        const home = resolveCalendarBracketSide(match, "home", entrantContext);
        const away = resolveCalendarBracketSide(match, "away", entrantContext);
        return {
            type: "bracket",
            number: Number(match.number),
            date: match.date,
            stage: STAGE_LABELS[match.stage] || match.stage || "決勝トーナメント",
            home: home.name,
            away: away.name,
            homeCode: home.code,
            awayCode: away.code,
            homeScore: normalizeScore(match.homeScore),
            awayScore: normalizeScore(match.awayScore),
            status: match.status || "scheduled",
            matchTime: match.matchTime || "",
            homeSub: home.sub,
            awaySub: away.sub
        };
    });

    return [...groupEntries, ...bracketEntries]
        .filter((entry) => entry.date)
        .sort((a, b) => new Date(a.date) - new Date(b.date) || a.number - b.number);
}

function resolveCalendarBracketSide(match, side, entrantContext) {
    const resolved = resolveFactBracketSide(match, side, entrantContext);
    return {
        name: resolved.main,
        code: resolved.code || "",
        sub: resolved.sub || ""
    };
}

function getCalendarMonths(entries) {
    if (!entries.length) return [];

    const monthIds = entries.map((entry) => {
        const { year, month } = getLocalDateParts(entry.date);
        return year * 12 + month;
    });
    const first = Math.min(...monthIds);
    const last = Math.max(...monthIds);
    const months = [];

    for (let monthId = first; monthId <= last; monthId++) {
        months.push({
            year: Math.floor(monthId / 12),
            month: monthId % 12
        });
    }

    return months;
}

function renderCalendarMonth(month, entries) {
    const entriesByDate = new Map();
    entries.forEach((entry) => {
        const key = getLocalDateKey(entry.date);
        if (!entriesByDate.has(key)) entriesByDate.set(key, []);
        entriesByDate.get(key).push(entry);
    });

    const firstDay = new Date(month.year, month.month, 1);
    const daysInMonth = new Date(month.year, month.month + 1, 0).getDate();
    const leadingBlanks = firstDay.getDay();
    const cellCount = Math.ceil((leadingBlanks + daysInMonth) / 7) * 7;
    const monthEntries = entries.filter((entry) => {
        const parts = getLocalDateParts(entry.date);
        return parts.year === month.year && parts.month === month.month;
    });
    const weekdays = ["日", "月", "火", "水", "木", "金", "土"];

    return `
        <article class="calendar-month-shell">
            <div class="calendar-month">
                <div class="calendar-month-title">
                    <h3>${escapeHtml(formatMonthTitle(month.year, month.month))}</h3>
                    <span class="calendar-month-meta">${monthEntries.length}試合</span>
                </div>
                <div class="calendar-weekdays" aria-hidden="true">
                    ${weekdays.map((day) => `<div class="calendar-weekday">${escapeHtml(day)}</div>`).join("")}
                </div>
                <div class="calendar-grid">
                    ${Array.from({ length: cellCount }, (_, index) => {
                        const day = index - leadingBlanks + 1;
                        if (day < 1 || day > daysInMonth) return `<div class="calendar-day is-muted"></div>`;
                        const key = getLocalDateKey(new Date(month.year, month.month, day));
                        return renderCalendarDay(month.year, month.month, day, entriesByDate.get(key) || []);
                    }).join("")}
                </div>
            </div>
        </article>
    `;
}

function renderCalendarDay(year, month, day, entries) {
    return `
        <div class="calendar-day ${isTodayLocal(year, month, day) ? "is-today" : ""}">
            <div class="calendar-day-head">

function buildRecordBoards(stats) {
    const configs = [
        {
            title: "得点王",
            valueLabel: "得点",
            note: "ゴール数順",
            getValue: (player) => player.goals,
            getDetail: (player) => formatRecordDetail([`${player.assists}A`, formatPlayerAppearances(player)])
        },
        {
            title: "アシスト王",
            valueLabel: "アシスト",
            note: "アシスト数順",
            getValue: (player) => player.assists,
            getDetail: (player) => formatRecordDetail([`${player.goals}G`, formatPlayerAppearances(player)])
        },
        {
            title: "得点関与",
            valueLabel: "G+A",
            note: "得点 + アシスト",
            getValue: (player) => player.goals + player.assists,
            getDetail: (player) => formatRecordDetail([`${player.goals}G`, `${player.assists}A`, formatPlayerAppearances(player)])
        },
        {
            title: "出場試合",
            valueLabel: "試合",
            note: "出場数順",
            getValue: (player) => player.matches,
            getDetail: (player) => formatRecordDetail([player.minutes ? `${player.minutes}分` : "", `${player.goals}G`, `${player.assists}A`])
        }
    ];

    return configs.map((config) => ({
        ...config,
        entries: getRecordEntries(stats, config)
    }));
}

function getRecordEntries(stats, config) {
    return stats
        .map((player) => ({
            ...player,
            recordValue: config.getValue(player)
        }))
        .filter((player) => player.recordValue > 0)
        .sort(sortRecordPlayers)
        .slice(0, 10);
}

function sortRecordPlayers(a, b) {
    return b.recordValue - a.recordValue
        || b.goals - a.goals
        || b.assists - a.assists
        || b.matches - a.matches
        || b.minutes - a.minutes
        || getRecordPlayerName(a).localeCompare(getRecordPlayerName(b), state.recordsLanguage === "en" ? "en" : "ja");
}

function renderRecordBoard(board) {

}

function renderRecordRow(player, index, board) {

                        ${flag}

                    </div>
                ` : ""}

            </div>
            <div class="record-value">
                <div class="record-value-main">${escapeHtml(player.recordValue)}</div>
                <div class="record-value-label">${escapeHtml(board.valueLabel)}</div>
            </div>
        </div>
    `;
}

function getRecordPlayerName(player) {
    if (state.recordsLanguage === "en") return player.playerEn || player.player || player.playerJa || "";
    return player.playerJa || player.player || player.playerEn || "";
}

function getRecordTeamName(player) {
    if (state.recordsLanguage === "en") return player.teamEn || player.teamRaw || player.team || player.teamJa || "";
    const fallback = player.teamEn || player.teamRaw;
    return player.teamJa || player.team || (fallback ? localizeTeam(fallback) : "");
}

function normalizePlayerStats(rawStats) {
    const rows = Array.isArray(rawStats)
        ? rawStats
        : (Array.isArray(rawStats?.players) ? rawStats.players : (Array.isArray(rawStats?.stats) ? rawStats.stats : []));

    return rows
        .map(normalizePlayerStatRow)
        .filter((player) => player.player);
}

function normalizePlayerStatRow(row) {
    const stats = row.stats || row.tournamentStats || row.seasonStats || row;
    const playerEn = readRecordName(row.playerEn || row.playerEnglish || row.playerNameEn)
        || readRecordName(row.player || row.playerName || row.name)
        || [readRecordName(row.firstName), readRecordName(row.lastName)].filter(Boolean).join(" ")
        || readRecordName(row.shortName);
    const playerJa = readRecordName(row.playerJa || row.playerJapanese || row.playerNameJa) || playerEn;
    const player = playerJa || playerEn;
    const teamEn = readRecordName(row.teamEn || row.teamRaw || row.teamEnglish || row.teamNameEn)
        || readRecordName(row.teamName || row.country || row.nationalTeam || row.team);
    const teamJaSource = readRecordName(row.teamJa || row.teamJapanese || row.teamNameJa || row.team);
    const teamJa = teamJaSource ? localizeTeam(teamJaSource) : (teamEn ? localizeTeam(teamEn) : "");
    const team = teamJa || teamEn;
    const teamCode = readRecordName(row.teamCode || row.teamAbbreviation || row.countryCode || row.associationCode);

    return {
        player,
        playerJa,
        playerEn,
        team,
        teamJa,
        teamEn,
        teamRaw: teamEn,
        teamCode,
        goals: readRecordNumber(stats, ["goals", "goal", "totalGoals", "goalsScored"]),
        assists: readRecordNumber(stats, ["assists", "assist", "totalAssists"]),
        matches: readRecordNumber(stats, ["matches", "appearances", "matchesPlayed", "played"]),
        minutes: readRecordNumber(stats, ["minutes", "minutesPlayed", "minsPlayed"]),
        yellowCards: readRecordNumber(stats, ["yellowCards", "yellows"]),
        redCards: readRecordNumber(stats, ["redCards", "reds"])
    };
}

function readRecordName(value) {
    if (!value) return "";
    if (Array.isArray(value)) return getText(value);
    if (typeof value === "object") {
        return readRecordName(value.name)
            || readRecordName(value.Name)
            || readRecordName(value.description)
            || readRecordName(value.Description)
            || readRecordName(value.TeamName)
            || readRecordName(value.ShortClubName);
    }
    return String(value);
}

function readRecordNumber(row, keys) {
    for (const key of keys) {
        const value = row?.[key];
        const number = typeof value === "number" ? value : Number(value);
        if (Number.isFinite(number)) return number;
    }
    return 0;
}

function sumPlayerMetric(stats, key) {
    return stats.reduce((sum, player) => sum + (Number.isFinite(player[key]) ? player[key] : 0), 0);
}

function getTopPlayerByMetric(stats, getValue) {
    return stats
        .map((player) => ({ ...player, recordValue: getValue(player) }))
        .filter((player) => player.recordValue > 0)
        .sort(sortRecordPlayers)[0] || null;
}

function formatPlayerAppearances(player) {
    if (player.matches && player.minutes) return `${player.matches}試合 / ${player.minutes}分`;
    if (player.matches) return `${player.matches}試合`;
    if (player.minutes) return `${player.minutes}分`;
    return "";
}

function formatRecordDetail(items) {
    return items.filter(Boolean).join(" / ");
}

    return `
        <div class="route-branch">
            <div class="route-branch-title">${escapeHtml(formatRouteSlotLabel(slot))} の内訳</div>
            <div class="route-branch-list">

            </div>
        </div>
    `;
}

function renderFactBracket(groupData) {
    const entrantContext = buildFactEntrantContext(groupData);

function renderBracketTree({ mode, matches, getMatchView, champion = "" }) {
    const model = buildBracketTreeModel(matches, mode);
    if (!model) return `<div class="empty-panel">トーナメント表を表示できませんでした。</div>`;

    return `
        <div class="bracket-tree-shell">
            <div class="bracket-tree-toolbar">
                <span>枝葉型トーナメント表</span>
                <span>Match 73-104</span>
            </div>
            <div class="bracket-tree-viewport" tabindex="0" aria-label="決勝トーナメント表">
                <div class="bracket-tree" style="--tree-width: ${BRACKET_TREE.width}px; --tree-height: ${BRACKET_TREE.height}px;">
                    <svg class="tree-lines" viewBox="0 0 ${BRACKET_TREE.width} ${BRACKET_TREE.height}" aria-hidden="true">
                        ${model.edges.map(renderTreeEdge).join("")}
                    </svg>
                    ${renderTreeStageLabels()}
                    ${model.nodes.map((node) => renderTreeNode(node, getMatchView, champion)).join("")}
                </div>
            </div>
        </div>
    `;
}

function buildBracketTreeModel(matches, mode) {
    const byNumber = new Map(matches.map((match) => [Number(match.number), match]));
    const final = matches.find((match) => match.stage === "Final") || byNumber.get(104);
    if (!final) return null;

    const leftRoot = getWinnerSourceMatch(final.a, byNumber);
    const rightRoot = getWinnerSourceMatch(final.b, byNumber);
    if (!leftRoot || !rightRoot) return null;

    const left = buildBracketSide(leftRoot, "left", byNumber);
    const right = buildBracketSide(rightRoot, "right", byNumber);
    const finalCenterY = (left.rootCenterY + right.rootCenterY) / 2;
    const finalNode = {
        id: Number(final.number),
        type: "final",
        match: final,
        x: BRACKET_TREE.centerX,
        y: finalCenterY - BRACKET_TREE.finalHeight / 2,
        w: BRACKET_TREE.finalWidth,
        h: BRACKET_TREE.finalHeight
    };
    const third = matches.find((match) => match.stage === "Play-off for third place");
    const thirdNode = third ? {
        id: Number(third.number),
        type: "third",
        match: third,
        x: BRACKET_TREE.centerX + (BRACKET_TREE.finalWidth - BRACKET_TREE.thirdWidth) / 2,
        y: BRACKET_TREE.height - BRACKET_TREE.thirdHeight - 26,
        w: BRACKET_TREE.thirdWidth,
        h: BRACKET_TREE.thirdHeight
    } : null;

    const nodes = [...left.nodes, ...right.nodes, finalNode, ...(thirdNode ? [thirdNode] : [])];
    const nodesById = new Map(nodes.map((node) => [node.id, node]));
    const edges = [
        ...left.edges.map((edge) => ({ ...edge, active: mode === "simulation" })),
        ...right.edges.map((edge) => ({ ...edge, active: mode === "simulation" })),
        { from: Number(leftRoot.number), to: Number(final.number), active: mode === "simulation" },
        { from: Number(rightRoot.number), to: Number(final.number), active: mode === "simulation" }
    ].map((edge) => ({ ...edge, path: makeTreeEdgePath(nodesById.get(edge.from), nodesById.get(edge.to)) })).filter((edge) => edge.path);

    return { nodes, edges };
}

function buildBracketSide(root, side, byNumber) {
    const leaves = collectLeafMatches(root, byNumber);
    const leafCenterByMatch = new Map();
    const stepY = BRACKET_TREE.cardHeight + BRACKET_TREE.rowGap;
    leaves.forEach((match, index) => {
        leafCenterByMatch.set(Number(match.number), BRACKET_TREE.top + BRACKET_TREE.cardHeight / 2 + index * stepY);
    });

    const nodes = [];
    const edges = [];

    function place(match) {
        const children = getWinnerChildMatches(match, byNumber);
        const childCenters = children.map(place);
        const centerY = childCenters.length
            ? childCenters.reduce((sum, value) => sum + value, 0) / childCenters.length
            : leafCenterByMatch.get(Number(match.number));
        const x = side === "left" ? BRACKET_TREE.leftColumns[match.stage] : BRACKET_TREE.rightColumns[match.stage];

        nodes.push({
            id: Number(match.number),
            type: "match",
            side,
            match,
            x,
            y: centerY - BRACKET_TREE.cardHeight / 2,
            w: BRACKET_TREE.cardWidth,
            h: BRACKET_TREE.cardHeight
        });

        children.forEach((child) => {
            edges.push({ from: Number(child.number), to: Number(match.number), active: false });
        });

        return centerY;
    }

    return { nodes, edges, rootCenterY: place(root) };
}

function collectLeafMatches(match, byNumber) {
    const children = getWinnerChildMatches(match, byNumber);
    if (!children.length) return [match];
    return children.flatMap((child) => collectLeafMatches(child, byNumber));
}

function getWinnerChildMatches(match, byNumber) {
    return [match.a, match.b].map((slot) => getWinnerSourceMatch(slot, byNumber)).filter(Boolean);
}

function getWinnerSourceMatch(slot, byNumber) {
    const match = /^W(\d+)$/.exec(slot || "");
    return match ? byNumber.get(Number(match[1])) : null;
}

function makeTreeEdgePath(from, to) {
    if (!from || !to) return "";
    const fromCenterY = from.y + from.h / 2;
    const toCenterY = to.y + to.h / 2;
    const movingRight = from.x < to.x;
    const startX = movingRight ? from.x + from.w : from.x;
    const endX = movingRight ? to.x : to.x + to.w;
    const midX = startX + (endX - startX) / 2;
    return `M ${startX} ${fromCenterY} H ${midX} V ${toCenterY} H ${endX}`;
}

function renderTreeEdge(edge) {
    return `<path class="tree-edge ${edge.active ? "is-active" : ""}" d="${edge.path}"></path>`;
}

function renderTreeStageLabels() {
    const labels = [
        ...Object.entries(BRACKET_TREE.leftColumns).map(([stage, x]) => ({ label: STAGE_LABELS[stage], x, w: BRACKET_TREE.cardWidth })),
        { label: "決勝", x: BRACKET_TREE.centerX, w: BRACKET_TREE.finalWidth },
        ...Object.entries(BRACKET_TREE.rightColumns).map(([stage, x]) => ({ label: STAGE_LABELS[stage], x, w: BRACKET_TREE.cardWidth }))
    ];

    return labels.map((item) => `
        <div class="tree-stage-label" style="left: ${item.x}px; width: ${item.w}px;">${escapeHtml(item.label)}</div>
    `).join("");
}

function renderTreeNode(node, getMatchView, champion) {
    const view = getMatchView(node.match);
    const nodeClass = node.type === "final" ? "tree-node is-center" : (node.type === "third" ? "tree-node is-third" : "tree-node");
    const title = node.type === "final" ? `<div class="tree-center-title">優勝決定戦</div>` : (node.type === "third" ? `<div class="tree-center-title">3位決定戦</div>` : "");
    const score = view.score ? `<span class="tree-inline-score">${escapeHtml(compactScoreLabel(view.score))}</span>` : "";
    const championText = node.type === "final" && champion ? `<div class="tree-champion">優勝: ${escapeHtml(champion)}</div>` : "";

    return `
        <article class="${nodeClass}" style="left: ${node.x}px; top: ${node.y}px; width: ${node.w}px; height: ${node.h}px;">
            <div class="tree-meta">
                <span>M${node.match.number}</span>
                ${score}
                <span>${escapeHtml(formatShortDate(node.match.date))}</span>
            </div>
            ${title}
            <div class="tree-teams">
                ${view.teams.map(renderTreeTeamRow).join("")}
            </div>
            ${championText}
        </article>
    `;
}

function renderTreeTeamRow(team) {
    const flag = team.code ? renderTeamFlagOnly(team.name, team.code) : "";
    return `
        <div class="tree-team-row ${team.winner ? "is-winner" : ""}">
            <div>
                <span class="tree-team-main">${flag}<span class="tree-team-name">${escapeHtml(team.name)}</span></span>
                ${team.sub ? `<span class="tree-team-sub">${escapeHtml(team.sub)}</span>` : ""}
            </div>
            ${team.score ? `<span class="tree-score">${escapeHtml(team.score)}</span>` : ""}
        </div>
    `;
}

function createFactMatchView(match, entrantContext) {
    const left = resolveFactBracketSide(match, "home", entrantContext);
    const right = resolveFactBracketSide(match, "away", entrantContext);
    const hasResult = hasScore(match);
    const winnerSide = getResolvedWinnerSide(match);
    return {
        score: hasResult ? formatFactBracketScore(match) : "",
        teams: [
            {
                name: left.main,
                code: left.code,
                sub: left.sub,
                score: hasResult ? scoreValue(match.homeScore) : "",
                winner: winnerSide === "home"
            },
            {
                name: right.main,
                code: right.code,
                sub: right.sub,
                score: hasResult ? scoreValue(match.awayScore) : "",
                winner: winnerSide === "away"
            }
        ]
    };
}

function compactScoreLabel(score) {
    return score.replace(" 延長", " 延").replace(" PK ", " PK");
}

function formatFactBracketScore(match) {
    const baseScore = `${scoreValue(match.homeScore)}-${scoreValue(match.awayScore)}`;
    if (Number.isFinite(match.homePenaltyScore) && Number.isFinite(match.awayPenaltyScore)) {
        return `${baseScore} PK ${match.homePenaltyScore}-${match.awayPenaltyScore}`;
    }
    return baseScore;
}

function computeStandings(matches, officialOrder = {}) {
    const groups = {};

    matches.forEach((match) => {
        if (!groups[match.group]) groups[match.group] = {};
        ensureTeam(groups[match.group], match.home, match.homeCode, match.homeSeed);
        ensureTeam(groups[match.group], match.away, match.awayCode, match.awaySeed);
    });

    matches.filter(hasScore).forEach((match) => {
        const group = groups[match.group];
        const home = group[match.home];
        const away = group[match.away];
        home.played++;
        away.played++;
        home.gf += match.homeScore;
        home.ga += match.awayScore;
        away.gf += match.awayScore;
        away.ga += match.homeScore;
        home.gd = home.gf - home.ga;
        away.gd = away.gf - away.ga;

        if (match.homeScore > match.awayScore) {
            home.points += 3;
            home.win++;
            away.loss++;
        } else if (match.homeScore < match.awayScore) {
            away.points += 3;
            away.win++;
            home.loss++;
        } else {
            home.points++;
            away.points++;
            home.draw++;
            away.draw++;
        }
    });

    return Object.fromEntries(GROUPS.map((group) => {
        const teams = Object.values(groups[group] || {}).map((team) => ({ ...team, group })).sort((a, b) => {
            const officialA = officialOrder[group]?.[a.name] || {};
            const officialB = officialOrder[group]?.[b.name] || {};
            return b.points - a.points
                || b.gd - a.gd
                || b.gf - a.gf
                || (officialA.position || 99) - (officialB.position || 99)
                || (officialA.order || 999) - (officialB.order || 999)
                || a.seed.localeCompare(b.seed);
        });
        return [group, teams];
    }));
}

function ensureTeam(group, name, code, seed) {
    if (!group[name]) {
        group[name] = { name, code, seed, points: 0, played: 0, win: 0, draw: 0, loss: 0, gf: 0, ga: 0, gd: 0 };
    }
}

function buildFactEntrantContext(groupData) {
    const standings = Object.fromEntries(Object.entries(groupData).map(([group, teams]) => [group, teams]));
    const progress = getGroupProgress(state.matches);
    const bracketByNumber = new Map(state.bracket.map((match) => [Number(match.number), match]));
    const completedGroups = new Set(GROUPS.filter((group) => isGroupComplete(group, progress)));
    const allGroupsComplete = GROUPS.every((group) => completedGroups.has(group));
    const thirdAssignments = {};

    if (allGroupsComplete) {
        const bestThirdTeams = GROUPS
            .map((group) => standings[group]?.[2])
            .filter(Boolean)
            .sort(sortFactThirdTeams)
            .slice(0, 8);
        Object.assign(thirdAssignments, assignThirdTeams(bestThirdTeams));
    }

    return { standings, progress, completedGroups, allGroupsComplete, thirdAssignments, bracketByNumber };
}

function getGroupProgress(matches) {
    const progress = Object.fromEntries(GROUPS.map((group) => [group, { total: 0, scored: 0, final: 0 }]));
    matches.forEach((match) => {
        if (!progress[match.group]) progress[match.group] = { total: 0, scored: 0, final: 0 };
        progress[match.group].total++;
        if (hasScore(match)) progress[match.group].scored++;
        if (match.status === "final") progress[match.group].final++;
    });
    return progress;
}

function isGroupComplete(group, progress) {
    const item = progress[group];
    return Boolean(item?.total) && item.final >= item.total;
}

function sortFactThirdTeams(a, b) {
    const officialA = state.standingsOrder[a.group]?.[a.name] || {};
    const officialB = state.standingsOrder[b.group]?.[b.name] || {};
    return b.points - a.points
        || b.gd - a.gd
        || b.gf - a.gf
        || (officialA.order ?? 999) - (officialB.order ?? 999)
        || GROUPS.indexOf(a.group) - GROUPS.indexOf(b.group)
        || a.name.localeCompare(b.name);
}

function resolveFactBracketSide(match, side, entrantContext) {
    const isHome = side === "home";
    const name = isHome ? match.home : match.away;
    const code = isHome ? match.homeCode : match.awayCode;
    const slot = isHome ? match.a : match.b;
    const slotView = resolveFactSlot(slot, entrantContext, match.number);

    if (name && name !== "未定") {
        return {
            main: name,
            code: code || slotView.code || "",
            sub: slotView.main && slotView.main !== name ? slotView.main : slotView.sub
        };
    }

    return slotView;
}

function resolveFactSlot(slot, entrantContext = {}, matchNumber = null) {
    if (!slot) return { main: "未定", sub: "" };
    const knockoutSource = resolveCompletedKnockoutSourceSlot(slot, entrantContext);
    if (knockoutSource) return knockoutSource;
    if (/^W\d+$/.test(slot)) return { main: `M${slot.slice(1)} 勝者`, sub: "" };
    if (/^RU\d+$/.test(slot)) return { main: `M${slot.slice(2)} 敗者`, sub: "" };

    const standings = entrantContext.standings || {};
    const completedGroups = entrantContext.completedGroups || new Set();
    const rank = slot[0];

    if ((rank === "1" || rank === "2") && slot.length === 2) {
        const group = slot[1];
        const slotLabel = `${group}組${rank}位`;
        const team = standings[group]?.[Number(rank) - 1];
        if (team && completedGroups.has(group)) {
            return {
                main: team.name,
                code: team.code || "",
                sub: slotLabel
            };
        }
        return {
            main: slotLabel,
            sub: ""
        };
    }

    if (rank === "3") {
        const letters = slot.slice(1).split("");
        const assigned = getAssignedThirdTeam(slot, matchNumber, entrantContext);
        if (assigned) {
            return {
                main: assigned.name,
                code: assigned.code || "",
                sub: `${assigned.group}組3位`
            };
        }

        const completedCandidates = letters
            .map((group) => completedGroups.has(group) ? standings[group]?.[2] : null)
            .filter(Boolean);
        return {
            main: `${letters.join("/")}組 3位枠`,
            sub: completedCandidates.length
                ? `完了組3位: ${completedCandidates.map((team) => `${team.group} ${team.name}`).join(" / ")}`
                : ""
        };
    }

    return { main: slot, sub: "" };
}

function resolveCompletedKnockoutSourceSlot(slot, entrantContext = {}) {
    const winner = /^W(\d+)$/.exec(slot || "");
    const runnerUp = /^RU(\d+)$/.exec(slot || "");
    const matchNumber = Number(winner?.[1] || runnerUp?.[1]);
    if (!matchNumber) return null;

    const source = entrantContext.bracketByNumber?.get(matchNumber)
        || state.bracket.find((match) => Number(match.number) === matchNumber);
    const winnerSide = getResolvedWinnerSide(source);
    if (!source || source.status !== "final" || !winnerSide) {
        return null;
    }

    const useHome = winner ? winnerSide === "home" : winnerSide === "away";
    const main = useHome ? source.home : source.away;
    if (!main || main === "未定") return null;

    return {
        main,
        code: (useHome ? source.homeCode : source.awayCode) || "",
        sub: `M${matchNumber} ${winner ? "勝者" : "敗者"}`
    };
}

function getResolvedWinnerSide(match) {
    if (!match) return "";
    if (match.winnerCode) {
        if (match.winnerCode === match.homeCode) return "home";
        if (match.winnerCode === match.awayCode) return "away";
    }
    if (match.winner) {
        if (match.winner === match.home) return "home";
        if (match.winner === match.away) return "away";
    }
    if (hasScore(match) && match.homeScore !== match.awayScore) {
        return match.homeScore > match.awayScore ? "home" : "away";
    }
    if (Number.isFinite(match.homePenaltyScore) && Number.isFinite(match.awayPenaltyScore) && match.homePenaltyScore !== match.awayPenaltyScore) {
        return match.homePenaltyScore > match.awayPenaltyScore ? "home" : "away";
    }
    return "";
}

function getAssignedThirdTeam(slot, matchNumber, entrantContext) {
    if (!entrantContext.allGroupsComplete) return null;
    const assignments = entrantContext.thirdAssignments || {};
    return assignments[`${matchNumber}:${slot}`]
        || assignments[Object.keys(assignments).find((key) => key.endsWith(`:${slot}`))]
        || null;
}

function createJapanConfirmedScenario(projectedStandings) {
    const match = findRoundOf32MatchBySlot(JAPAN_CONFIRMED_SLOT);
    const opponentSlot = getOpponentSlot(match, JAPAN_CONFIRMED_SLOT);
    const opponent = resolveBracketMatchSlotView(match, opponentSlot, projectedStandings);
    const expectedOpponent = mergeKnownOpponentIntoExpectedSlot(
        resolveExpectedTeamSlot(opponentSlot, projectedStandings),
        opponent
    );

    return {
        match,
        opponentSlot,
        title: `${JAPAN_CONFIRMED_GROUP}組${JAPAN_CONFIRMED_RANK}位通過`,
        japanSlotLabel: `${JAPAN_CONFIRMED_SLOT} / ${JAPAN_CONFIRMED_GROUP}組${JAPAN_CONFIRMED_RANK}位`,
        opponentLabel: opponent.name || "未定",
        expectedOpponent,
        routeLabel: match ? formatJapanMatchupLabel(match, projectedStandings) : `${JAPAN_CONFIRMED_SLOT} vs 未定`,
        matchLabel: formatJapanMatchLabel(match)
    };
}

function createJapanKnockoutStatus(scenario) {
    const match = scenario.match;
    const japanSide = getMatchSideBySlot(match, JAPAN_CONFIRMED_SLOT);
    const opponentSide = japanSide === "home" ? "away" : (japanSide === "away" ? "home" : "");
    const japanTeam = getBracketMatchTeam(match, japanSide, {
        name: JAPAN_TEAM,
        code: FIFA_RANKINGS[JAPAN_TEAM]?.code || "JPN"
    });
    const opponentTeam = getBracketMatchTeam(match, opponentSide, {
        name: scenario.opponentLabel || "未定",
        code: scenario.expectedOpponent?.team?.code || ""
    });
    const winnerSide = getResolvedWinnerSide(match);
    const hasFinalWinner = Boolean(match && match.status === "final" && japanSide && winnerSide);
    const japanWon = hasFinalWinner && winnerSide === japanSide;
    const eliminated = hasFinalWinner && winnerSide !== japanSide;
    const winnerTeam = hasFinalWinner
        ? getBracketMatchTeam(match, winnerSide, japanWon ? japanTeam : opponentTeam)
        : japanTeam;

    return {
        state: eliminated ? "eliminated" : (japanWon ? "advanced" : "pending"),
        match,
        japanSide,
        opponentSide,
        japanTeam,
        opponentTeam,
        winnerTeam,
        routeFocusTeam: eliminated ? winnerTeam : japanTeam,
        routeStartSlot: hasFinalWinner ? `W${match.number}` : JAPAN_CONFIRMED_SLOT
    };
}

function getBracketMatchTeam(match, side, fallback = {}) {
    const fallbackName = fallback.name || "未定";
    const fallbackCode = fallback.code || "";
    if (!match || !side) {
        return { name: fallbackName, code: fallbackCode, score: null, side };
    }

    const isHome = side === "home";
    return {
        name: (isHome ? match.home : match.away) || fallbackName,
        code: (isHome ? match.homeCode : match.awayCode) || fallbackCode,
        score: isHome ? match.homeScore : match.awayScore,
        side
    };
}

function formatJapanPerspectiveScore(japanStatus) {
    if (!hasScore(japanStatus.match)) return "スコア未確定";

}

function formatJapanRouteFocusSub(japanStatus, sourceMatch) {
    if (!sourceMatch) return `${JAPAN_CONFIRMED_GROUP}組${JAPAN_CONFIRMED_RANK}位`;
    const sourceNumber = Number(sourceMatch[1]);
    if (japanStatus?.state === "eliminated" && Number(japanStatus.match?.number) === sourceNumber) {
        return `日本を破りM${sourceNumber}勝者として勝ち上がり`;
    }
    return `M${sourceNumber}勝者として勝ち上がり`;
}

function buildJapanKnockoutRoute(startSlot) {
    const route = [];
    const visited = new Set();
    let entrySlot = startSlot;

    while (entrySlot && !visited.has(entrySlot)) {
        visited.add(entrySlot);
        const match = state.bracket.find((item) => item.a === entrySlot || item.b === entrySlot);
        if (!match) break;

        route.push({
            match,
            entrySlot,
            opponentSlot: getOpponentSlot(match, entrySlot)
        });

        if (match.stage === "Final") break;
        entrySlot = `W${match.number}`;
    }

    return route;
}

function resolveJapanRouteSlotView(slot, entrySlot, match, projectedStandings, japanStatus) {
    if (slot === entrySlot) {
        const sourceMatch = /^W(\d+)$/.exec(slot || "");
        const focusTeam = japanStatus?.routeFocusTeam || {
            name: JAPAN_TEAM,
            code: FIFA_RANKINGS[JAPAN_TEAM]?.code || "JPN"
        };
        return {
            name: focusTeam.name || JAPAN_TEAM,
            code: focusTeam.code || FIFA_RANKINGS[JAPAN_TEAM]?.code || "JPN",
            sub: formatJapanRouteFocusSub(japanStatus, sourceMatch),
            slotLabel: slot,
            focus: true,
            focusType: japanStatus?.state === "eliminated" ? "route" : "japan"
        };
    }

    return resolveBracketMatchSlotView(match, slot, projectedStandings);
}

function resolveBracketMatchSlotView(match, slot, projectedStandings) {
    const projected = resolveProjectedSlotView(slot, projectedStandings);
    const side = getMatchSideBySlot(match, slot);
    const known = getKnownMatchSideView(match, side);
    if (!known) return projected;

    return {
        ...projected,
        ...known,
        sub: formatRouteSlotLabel(slot),
        slotLabel: slot,
        known: true
    };
}

function getMatchSideBySlot(match, slot) {
    if (!match || !slot) return "";
    if (match.a === slot) return "home";
    if (match.b === slot) return "away";
    return "";
}

function getKnownMatchSideView(match, side) {
    if (!match || !side) return null;
    const isHome = side === "home";
    const name = isHome ? match.home : match.away;
    if (!name || name === "未定") return null;

    return {
        name,
        code: (isHome ? match.homeCode : match.awayCode) || ""
    };
}

function mergeKnownOpponentIntoExpectedSlot(expectedOpponent, opponentView) {
    if (!expectedOpponent || !opponentView?.known) return expectedOpponent;

    const groupSnapshot = expectedOpponent.groupSnapshot || [];
    const snapshotMatch = groupSnapshot.find((team) => team.name === opponentView.name);
    const team = {
        ...(snapshotMatch || expectedOpponent.team),
        name: opponentView.name,
        code: opponentView.code || snapshotMatch?.code || expectedOpponent.team.code || ""
    };

    return {
        ...expectedOpponent,
        team,
        groupRank: snapshotMatch ? groupSnapshot.indexOf(snapshotMatch) + 1 : expectedOpponent.groupRank,
        slotLabel: `${formatRouteSlotLabel(expectedOpponent.slot)}確定`
    };
}

function resolveProjectedSlotView(slot, projectedStandings) {
    if (!slot) return { name: "未定", code: "", sub: "", slotLabel: "" };

    const direct = /^([12])([A-L])$/.exec(slot);
    if (direct) {
        const expected = resolveExpectedTeamSlot(slot, projectedStandings);
        if (expected) {
            return {
                name: expected.team.name,
                code: expected.team.code || "",
                sub: `${expected.group}組${expected.groupRank}位 / ${formatProjectedTeamRecord(expected.team)}`,
                slotLabel: slot
            };
        }

        return {
            name: `${direct[2]}組${direct[1]}位`,
            code: "",
            sub: "",
            slotLabel: slot
        };
    }

    if (THIRD_PLACE_SLOTS.has(slot)) {
        const groups = slot.slice(1).split("").join("/");
        return {
            name: `${groups}組 3位枠`,
            code: "",
            sub: "3位上位8枠",
            slotLabel: slot
        };
    }

    const winner = /^W(\d+)$/.exec(slot);
    if (winner) {
        return {
            name: `M${winner[1]} 勝者`,
            code: "",
            sub: "",
            slotLabel: slot
        };
    }

    const runnerUp = /^RU(\d+)$/.exec(slot);
    if (runnerUp) {
        return {
            name: `M${runnerUp[1]} 敗者`,
            code: "",
            sub: "",
            slotLabel: slot
        };
    }

    return { name: slot, code: "", sub: "", slotLabel: slot };
}

function collectOpponentLeafMatches(slot) {
    const byNumber = new Map(state.bracket.map((match) => [Number(match.number), match]));
    const source = getWinnerSourceMatch(slot, byNumber);
    return source ? collectLeafMatches(source, byNumber) : [];
}

function formatRouteSlotLabel(slot) {
    if (!slot) return "未定";

    const winner = /^W(\d+)$/.exec(slot);
    if (winner) return `M${winner[1]}勝者`;

    const direct = /^([12])([A-L])$/.exec(slot);
    if (direct) return `${direct[2]}組${direct[1]}位`;

    if (THIRD_PLACE_SLOTS.has(slot)) {
        return `${slot.slice(1).split("").join("/")}組3位枠`;
    }

    return slot;
}

function findRoundOf32MatchBySlot(slot) {
    return state.bracket.find((match) => match.stage === "Round of 32" && (match.a === slot || match.b === slot));
}

function getOpponentSlot(match, slot) {
    if (!match) return "";
    return match.a === slot ? match.b : match.a;
}

function getJapanProjectedStandings() {
    const standings = computeStandings(state.matches, state.standingsOrder);
    return Object.fromEntries(GROUPS.map((group) => {
        const teams = [...(standings[group] || [])]
            .sort((a, b) => sortJapanProjectedTeams(a, b, group))
            .map((team, index) => enrichJapanProjectedTeam(team, index + 1));
        return [group, teams];
    }));
}

function sortJapanProjectedTeams(a, b, group) {
    const officialA = state.standingsOrder[group]?.[a.name] || {};
    const officialB = state.standingsOrder[group]?.[b.name] || {};
    const rankA = FIFA_RANKINGS[a.name] || {};
    const rankB = FIFA_RANKINGS[b.name] || {};

    return b.points - a.points
        || b.gd - a.gd
        || b.gf - a.gf
        || (officialA.position || 99) - (officialB.position || 99)
        || (officialA.order || 999) - (officialB.order || 999)
        || (rankA.rank || 999) - (rankB.rank || 999)
        || (rankB.points || 0) - (rankA.points || 0)
        || a.seed.localeCompare(b.seed);
}

function enrichJapanProjectedTeam(team, position) {
    const ranking = FIFA_RANKINGS[team.name] || {};
    return {
        ...team,
        projectedPosition: position,
        rank: ranking.rank || 999,
        rankingPoints: ranking.points || 0,
        code: team.code || ranking.code || ""
    };
}

function resolveExpectedTeamSlot(slot, projectedStandings) {
    const match = /^([12])([A-L])$/.exec(slot || "");
    if (!match) return null;

    const groupRank = Number(match[1]);
    const group = match[2];
    const groupSnapshot = projectedStandings?.[group]?.length ? projectedStandings[group] : getProjectedGroupTeams(group);
    const team = groupSnapshot[groupRank - 1];
    if (!team) return null;

    return {
        slot,
        group,
        groupRank,
        team,
        groupSnapshot,
        slotLabel: `${group}組${groupRank}位想定`
    };
}

function getProjectedGroupTeams(group) {
    return (SIM_GROUPS[group] || [])
        .map((name, index) => ({
            name,
            projectedPosition: index + 1,
            rank: FIFA_RANKINGS[name]?.rank || 999,
            rankingPoints: FIFA_RANKINGS[name]?.points || 0,
            code: FIFA_RANKINGS[name]?.code || "",
            played: 0,
            points: 0,
            gf: 0,
            ga: 0,
            gd: 0
        }))
        .sort((a, b) => a.rank - b.rank || b.rankingPoints - a.rankingPoints || a.name.localeCompare(b.name))
        .map((team, index) => ({ ...team, projectedPosition: index + 1 }));
}

function formatJapanMatchLabel(match) {
    if (!match) return "Match未定";
    return `M${match.number} / ${formatShortDate(match.date)}`;
}

function formatJapanMatchupLabel(match, projectedStandings) {
    if (!match) return "未定";
    const left = resolveBracketMatchSlotView(match, match.a, projectedStandings);
    const right = resolveBracketMatchSlotView(match, match.b, projectedStandings);
    return `${left.name} vs ${right.name}`;
}

function formatJapanRouteMatchupLabel(match, entrySlot, projectedStandings, japanStatus) {
    if (!match) return "未定";
    const left = resolveJapanRouteSlotView(match.a, entrySlot, match, projectedStandings, japanStatus);
    const right = resolveJapanRouteSlotView(match.b, entrySlot, match, projectedStandings, japanStatus);
    return `${left.name} vs ${right.name}`;
}

function formatProjectedTeamRecord(team) {
    return `${team.played}試合 ${team.points}pt ${formatSigned(team.gd)} ${team.gf}得`;
}

function formatFifaRank(rank) {
    return Number.isFinite(rank) && rank < 999 ? `${rank}位` : "未設定";
}

function runSimulation() {
    const groups = {};
    const first = {};
    const second = {};
    const thirds = [];

    GROUPS.forEach((group) => {
        groups[group] = SIM_GROUPS[group].map((name, index) => createSimTeam(name, group, index + 1));
        for (let i = 0; i < groups[group].length; i++) {
            for (let j = i + 1; j < groups[group].length; j++) {
                simulateGroupMatch(groups[group][i], groups[group][j]);
            }
        }
        groups[group].sort(sortSimTeams);
        groups[group].forEach((team, index) => team.seed = `${group}${index + 1}`);
        first[group] = groups[group][0];
        second[group] = groups[group][1];
        thirds.push(groups[group][2]);
    });

    const bestThirdTeams = thirds.sort(sortSimTeams).slice(0, 8);
    const thirdAssignments = assignThirdTeams(bestThirdTeams);
    const winners = {};
    const runnersUp = {};
    const stageResults = {};

    STAGE_ORDER.forEach((stage) => {
        const stageMatches = state.bracket.filter((match) => match.stage === stage);
        stageResults[stage] = stageMatches.map((match) => {
            const teamA = resolveSimSlot(match.a, { first, second, thirdAssignments, winners, runnersUp, matchNumber: match.number });
            const teamB = resolveSimSlot(match.b, { first, second, thirdAssignments, winners, runnersUp, matchNumber: match.number });
            const result = simulateKnockoutMatch(teamA, teamB);
            winners[match.number] = result.winner;
            runnersUp[match.number] = result.loser;
            return { ...match, teamA, teamB, result };
        });
    });

    const final = stageResults.Final[0];
    return { groups, bestThirdTeams, stageResults, champion: final.result.winner };
}

function createSimTeam(name, group, drawPosition) {
    return {
        name,
        rating: TEAM_RATINGS[name] || 75,
        group,
        seed: `${group}${drawPosition}`,
        points: 0,
        played: 0,
        win: 0,
        draw: 0,
        loss: 0,
        gf: 0,
        ga: 0,
        gd: 0
    };
}

function simulateGroupMatch(teamA, teamB) {
    const score = getGoals(teamA.rating, teamB.rating);
    teamA.played++;
    teamB.played++;
    teamA.gf += score.gf;
    teamA.ga += score.ga;
    teamB.gf += score.ga;
    teamB.ga += score.gf;
    teamA.gd = teamA.gf - teamA.ga;
    teamB.gd = teamB.gf - teamB.ga;

    if (score.gf > score.ga) {
        teamA.points += 3;
        teamA.win++;
        teamB.loss++;
    } else if (score.gf < score.ga) {
        teamB.points += 3;
        teamB.win++;
        teamA.loss++;
    } else {
        teamA.points++;
        teamB.points++;
        teamA.draw++;
        teamB.draw++;
    }
}

function getGoals(ratingA, ratingB) {
    const diff = (ratingA - ratingB) / 10;
    const baseA = Math.max(0.3, 1.25 + diff);
    const baseB = Math.max(0.3, 1.25 - diff);
    return {
        gf: Math.floor(Math.random() * (baseA + 1.5)) + (Math.random() > 0.75 ? 1 : 0),
        ga: Math.floor(Math.random() * (baseB + 1.5)) + (Math.random() > 0.75 ? 1 : 0)
    };
}

function simulateKnockoutMatch(teamA, teamB) {
    let score = getGoals(teamA.rating, teamB.rating);
    let label = `${score.gf}-${score.ga}`;

    if (score.gf === score.ga) {
        score.gf += Math.random() > 0.72 ? 1 : 0;
        score.ga += Math.random() > 0.72 ? 1 : 0;
        label = `${score.gf}-${score.ga} 延長`;

        if (score.gf === score.ga) {
            const pkA = 3 + Math.floor(Math.random() * 3);
            const pkB = pkA === 5 ? 4 : (Math.random() > 0.5 ? pkA + 1 : pkA - 1);
            label = `${label} PK ${pkA}-${pkB}`;
            return pkA > pkB ? { winner: teamA, loser: teamB, score: label } : { winner: teamB, loser: teamA, score: label };
        }
    }

    return score.gf > score.ga ? { winner: teamA, loser: teamB, score: label } : { winner: teamB, loser: teamA, score: label };
}

function assignThirdTeams(bestThirdTeams) {
    const slots = state.bracket
        .filter((match) => match.stage === "Round of 32")
        .flatMap((match) => [match.a, match.b].map((slot) => ({ matchNumber: match.number, slot })))
        .filter(({ slot }) => THIRD_PLACE_SLOTS.has(slot));

    const assignments = {};
    const used = new Set();

    function backtrack(index) {
        if (index >= slots.length) return true;
        const current = slots[index];
        const allowed = current.slot.slice(1).split("");
        for (const team of bestThirdTeams) {
            if (used.has(team.group) || !allowed.includes(team.group)) continue;
            used.add(team.group);
            assignments[`${current.matchNumber}:${current.slot}`] = team;
            if (backtrack(index + 1)) return true;
            used.delete(team.group);
            delete assignments[`${current.matchNumber}:${current.slot}`];
        }
        return false;
    }

    backtrack(0);
    return assignments;
}

function resolveSimSlot(slot, context) {
    if (/^1[A-L]$/.test(slot)) return context.first[slot[1]];
    if (/^2[A-L]$/.test(slot)) return context.second[slot[1]];
    if (THIRD_PLACE_SLOTS.has(slot)) return context.thirdAssignments[`${context.matchNumber}:${slot}`] || context.thirdAssignments[Object.keys(context.thirdAssignments).find((key) => key.endsWith(`:${slot}`))];
    if (/^W\d+$/.test(slot)) return context.winners[Number(slot.slice(1))];
    if (/^RU\d+$/.test(slot)) return context.runnersUp[Number(slot.slice(2))];
    return { name: slot, rating: 70, seed: slot };
}

function renderSimBracket(sim) {
    const matches = STAGE_ORDER.flatMap((stage) => sim.stageResults[stage] || []);
    return renderBracketTree({
        mode: "simulation",
        matches,
        champion: sim.champion.name,
        getMatchView: createSimMatchView
    });
}

function createSimMatchView(match) {
    return {
        score: match.result.score,
        teams: [
            {
                name: match.teamA.name,
                sub: match.teamA.seed || match.a,
                winner: match.result.winner.name === match.teamA.name
            },
            {
                name: match.teamB.name,
                sub: match.teamB.seed || match.b,
                winner: match.result.winner.name === match.teamB.name
            }
        ]
    };
}

function sortSimTeams(a, b) {
    return b.points - a.points || b.gd - a.gd || b.gf - a.gf || b.rating - a.rating || a.name.localeCompare(b.name);
}

function getText(value) {
    return value?.[0]?.Description || "";
}

function getTeamName(team) {
    return getText(team?.TeamName) || team?.ShortClubName || "";
}

function localizeTeam(name) {
    return TEAM_NAME_JA[name] || name || "未定";
}

function getTeamFlag(name, code = "") {
    const normalizedCode = String(code || "").toUpperCase();
    const flagCode = FIFA_FLAG_CODE[normalizedCode] || TEAM_FLAG_CODE[name] || TEAM_FLAG_CODE[localizeTeam(name)];
    if (!flagCode) return "";
    return flagCodeToEmoji(flagCode);
}

function flagCodeToEmoji(code) {
    if (code === "GB-ENG") return "\u{1F3F4}\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}";
    if (code === "GB-SCT") return "\u{1F3F4}\u{E0067}\u{E0062}\u{E0073}\u{E0063}\u{E0074}\u{E007F}";
    if (!/^[A-Z]{2}$/.test(code)) return "";
    return String.fromCodePoint(...[...code].map((char) => 127397 + char.charCodeAt(0)));
}

function normalizeScore(score) {
    return Number.isFinite(score) ? score : null;
}

function hasScore(match) {
    return Number.isFinite(match.homeScore) && Number.isFinite(match.awayScore);
}

function getFactStatus(match) {
    if (match.ResultType === 1 || match.MatchStatus === 0) return "final";
    if (Number.isFinite(match.HomeTeamScore) && Number.isFinite(match.AwayTeamScore)) return "live";
    return "scheduled";
}

function statusLabel(match) {
    if (match.status === "final") return "FT";
    if (match.status === "live") return match.matchTime ? `LIVE ${match.matchTime}` : "LIVE";
    return "予定";
}

function formatSigned(value) {
    return value > 0 ? `+${value}` : `${value}`;
}

function scoreValue(score) {
    return Number.isFinite(score) ? String(score) : "–";
}

function getLocalDateParts(value) {
    const date = new Date(value);
    return {
        year: date.getFullYear(),
        month: date.getMonth(),
        day: date.getDate()
    };
}

function getLocalDateKey(value) {
    const { year, month, day } = getLocalDateParts(value);
    return `${year}-${pad2(month + 1)}-${pad2(day)}`;
}

function isTodayLocal(year, month, day) {
    const today = new Date();
    return today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
}

function formatMonthTitle(year, month) {
    return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric",
        month: "long"
    }).format(new Date(year, month, 1));
}

function formatMatchTime(value) {
    return new Intl.DateTimeFormat("ja-JP", {
        hour: "2-digit",
        minute: "2-digit"
    }).format(new Date(value));
}

function formatShortDate(value) {
    if (!value) return "";
    const date = new Date(value);
    return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
    }).format(date);
}

function formatDateTime(value) {
    return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
    }).format(new Date(value));
}

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function pad2(value) {
    return String(value).padStart(2, "0");
}
